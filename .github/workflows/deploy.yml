name: Deploy site

# Deploys the DialTone marketing site at dialtone.menu (Worker `dawn-pine-d058`).
# The entire repo is the site, so any push to `main` triggers a deploy.
# Also manually invokable via workflow_dispatch.
#
# Required GitHub Actions secrets:
#   CLOUDFLARE_API_TOKEN   — Workers edit permission on the dialtone.menu zone
#   CLOUDFLARE_ACCOUNT_ID  — Cloudflare account ID

on:
  push:
    branches: [main]

  workflow_dispatch:

jobs:
  deploy:
    name: Deploy site (dialtone.menu)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm wrangler deploy
