# DialTone — marketing site (dialtone.menu, www.dialtone.menu)
# Cloudflare Workers with Static Assets
# Docs: https://developers.cloudflare.com/workers/static-assets/
#
# Static multi-page site (index.html, privacy.html, terms.html). The
# live Worker that serves dialtone.menu was originally created via
# the Cloudflare dashboard's "Upload assets" flow (which generates
# the three-part random name). Keeping that exact name here so
# `wrangler deploy` updates the same Worker rather than creating a
# duplicate, and the existing custom domain bindings
# (`dialtone.menu`, `www.dialtone.menu`) stay intact.

name = "dawn-pine-d058"
main = "worker.js"
compatibility_date = "2026-04-20"
compatibility_flags = []

# Contact form destination. The Worker's `/api/contact` handler forwards
# validated submissions to FormSubmit.co, which emails this address.
# First send requires one-time activation via link FormSubmit emails to
# this address.
[vars]
CONTACT_EMAIL = "hello@bytestreams.ai"
# Identifies this site in the contact-form email subject and body.
# We share `hello@bytestreams.ai` across ByteStreams, DialTone, and
# DialTone.med, so each Worker sets its own SITE_NAME to tag outbound
# submissions.
SITE_NAME = "DialTone"

# Assets directory is the repo root. `.assetsignore` excludes
# `wrangler.toml`, `.assetsignore`, and `worker.js` so those files
# don't get served back as public assets.
[assets]
directory = "./"
# `binding = "ASSETS"` exposes the assets collection to the Worker as
# `env.ASSETS`, which `worker.js` uses to proxy `/favicon.ico` to
# `/images/favicon.png` and to resolve unmatched paths. Without this
# binding, `env.ASSETS` is undefined and those fallbacks 404 silently.
binding = "ASSETS"
# not_found_handling = "none" — this is a static multi-page site, not
# an SPA, so unknown paths should return 404 rather than rewriting
# to /index.html.
not_found_handling = "none"

# Keep Worker observability settings in source control so dashboard and
# CI/CD deployments stay consistent.
[observability.logs]
enabled = true
invocation_logs = true

[observability.traces]
enabled = false
